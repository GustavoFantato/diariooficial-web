<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diário Oficial · Monitoramento</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <div class="title">Diário Oficial · Monitoramento</div>
      </div>
    </header>

    <main class="main">
      <nav class="tabs">
        <button class="tab active" data-tab="matches">Encontrados</button>
        <button class="tab" data-tab="runs">Execuções</button>
        <button class="tab" data-tab="people">Pessoas</button>
      </nav>

      <div class="content">
        <!-- Aba Resultados -->
        <div class="tabPane" id="tab-matches">
            <h2>Resultados Encontrados</h2>
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1;">
                    <h3>CEI</h3>
                    <div id="tableMatchesCEI" class="table"></div>
                </div>
                <div style="flex: 1;">
                    <h3>EMEI</h3>
                    <div id="tableMatchesEMEI" class="table"></div>
                </div>
            </div>
        </div>

        <!-- Aba Execuções -->
        <div class="tabPane hidden" id="tab-runs">
          <h2>Histórico de Execuções</h2>
          <div id="tableRuns" class="table"></div>
        </div>

        <!-- Aba Pessoas -->
        <div class="tabPane hidden" id="tab-people">
          <h2>Base de Pessoas</h2>
          <div class="toolbar" style="display: flex; gap: 10px;">
            <input id="peopleFilter" class="input" placeholder="Filtrar por nome ou RF..." style="flex: 1;" />
          </div>
          <div id="tablePeople" class="table"></div>
        </div>
          <!-- Barra de filtros removida -->
          <div id="tablePeople" class="table"></div>
        </div>
      </div> <!-- Fecha a div content -->
    </main>

    <script src="./app.js"></script>
  </body>
</html>
