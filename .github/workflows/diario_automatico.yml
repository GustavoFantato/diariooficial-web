name: Atualizar Diário Oficial

on:
  schedule:
    # Roda todo dia de seg a sex às 08:00 (UTC)
    # Nota: O GitHub Actions usa UTC. 08:00 UTC = 05:00 ou 04:00 BRT dependendo do horário de verão.
    # Ajuste o horário conforme sua necessidade.
    - cron: '0 11 * * 1-5' 
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  executar-scripts:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para o git push
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install pandas requests pdfplumber beautifulsoup4 openpyxl

      - name: Rodar run.py e buscar.py
        run: |
          python backend/run.py
          python backend/buscar.py

      - name: Fazer commit do resultado
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add outputs/encontrados.json
          git commit -m "Atualização automática: Diário Oficial" || echo "Sem mudanças para commit"
          git push