name: Atualizar Diário Oficial

on:
  push:           
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 06:30 BRT
    - cron: '30 08 * * 1-5'
    # 07:30 BRT 
    - cron: '30 09 * * 1-5'
    # 08:30 BRT 
    - cron: '30 10 * * 1-5'

jobs:
  executar-e-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Instalar ferramentas de sistema (poppler-utils)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Criar arquivo de credenciais do Google
        run: |
          mkdir -p backend
          echo '${{ secrets.GCP_CREDENTIALS }}' > backend/credentials.json

      - name: Rodar scripts
        run: |
          python backend/run.py
          python backend/buscar.py

      - name: Commit dos resultados na main
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add outputs/encontrados.json
          git commit -m "Atualização automática: Diário Oficial" || echo "Sem mudanças para commit"
          git push

      - name: Deploy Frontend para GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/app
          branch: gh-pages