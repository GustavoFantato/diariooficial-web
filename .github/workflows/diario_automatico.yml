name: Atualizar Diário Oficial

on:
  push:           
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 06:55 BRT -> 09:55 UTC
    - cron: '55 09 * * 1-5'
    # 07:55 BRT -> 10:55 UTC 
    - cron: '55 10 * * 1-5'

jobs:
  executar-e-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar scripts
        run: |
          python backend/run.py
          python backend/buscar.py

      - name: Commit dos resultados na main
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add outputs/encontrados.json
          git commit -m "Atualização automática: Diário Oficial" || echo "Sem mudanças para commit"
          git push

      - name: Deploy Frontend para GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/app
          branch: gh-pages
